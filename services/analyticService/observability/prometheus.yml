global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: agendamento-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - agenda-service:8000
          - auth-service:8000
          - users-service:8000
          - notificacao-service:8000
          - analytic-service:8000
