services:
  notificacao-service:
    build:
      context: .
    env_file:
      - path: ../../.env
        required: false
      - path: ./.env
        required: false
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@notification-postgres:5432/${NOTIFICATION_POSTGRES_DB:-notificationdb}}
      USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE:-users.events}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-agenda.events}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notificacao-service.rule=PathPrefix(`/notification`)"
      - "traefik.http.routers.notificacao-service.entrypoints=web"
      - "traefik.http.routers.notificacao-service.middlewares=auth@file,notification-strip"
      - "traefik.http.middlewares.notification-strip.stripprefix.prefixes=/notification"
      - "traefik.http.services.notificacao-service.loadbalancer.server.port=8000"
      - "traefik.docker.network=web"
    ports:
      - "${NOTIFICACAO_PORT:-8003}:8000"
    depends_on:
      notification-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - web

  notification-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${NOTIFICATION_POSTGRES_DB:-notificationdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    networks:
      - web

networks:
  web:
    name: web

volumes:
  notification-postgres-data:
